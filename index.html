<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Webmap com 3 planos de fundo</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      #map {
        height: 100%;
        width: 100%;
      }
      .search-box {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 10px;
        padding: 10px 12px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
        font: 13px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        min-width: 240px;
      }
      .search-box .row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .search-box input {
        flex: 1;
        padding: 7px 9px;
        border-radius: 8px;
        border: 1px solid rgba(0, 0, 0, 0.18);
        outline: none;
      }
      .search-box button {
        padding: 7px 10px;
        border-radius: 8px;
        border: 1px solid rgba(0, 0, 0, 0.18);
        background: white;
        cursor: pointer;
      }
      .search-box button.primary {
        background: #2563eb;
        color: white;
        border-color: #1d4ed8;
      }
      .search-box small {
        display: block;
        margin-top: 6px;
        color: rgba(0, 0, 0, 0.7);
      }
      .leaflet-control-layers {
        max-height: 70vh;
        overflow: auto;
      }
    </style>
  </head>

  <body>
    <div id="map" aria-label="Mapa interativo"></div>
    <div class="search-box" role="region" aria-label="Pesquisa por zona eleitoral">
      <div style="font-weight: 650; margin-bottom: 6px;">Pesquisar por <code>zona_eleit</code></div>
      <div class="row">
        <input id="zonaInput" type="text" inputmode="text" placeholder="Ex.: 123" />
        <button id="searchBtn" class="primary" type="button">Buscar</button>
        <button id="clearBtn" type="button">Limpar</button>
      </div>
      <small id="searchStatus">Dica: pressione Enter para buscar.</small>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script>
      const baseLayers = {
        "OpenStreetMap": L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }),
        "Carto Positron": L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
          maxZoom: 20,
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors ' +
            '&copy; <a href="https://carto.com/attributions">CARTO</a>'
        }),
        "Esri Satélite": L.tileLayer(
          "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
          {
            maxZoom: 19,
            attribution:
              "Tiles &copy; Esri — Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community"
          }
        )
      };

      const map = L.map("map", {
        center: [-23.55, -46.63], // fallback (SP)
        zoom: 12,
        layers: [baseLayers["OpenStreetMap"]]
      });

      const overlays = {};
      const layerControl = L.control.layers(baseLayers, overlays, { collapsed: false }).addTo(map);

      let geoLayer = null;

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatValue(value) {
        if (value === null || value === undefined) return "";
        if (typeof value === "object") return escapeHtml(JSON.stringify(value));
        return escapeHtml(value);
      }

      function buildAttributesTable(properties) {
        const entries = Object.entries(properties || {});
        if (entries.length === 0) return "<div><b>Sem atributos</b></div>";

        const rows = entries
          .sort(([a], [b]) => a.localeCompare(b))
          .map(
            ([k, v]) =>
              `<tr><th style="text-align:left; padding:4px 8px; vertical-align:top; white-space:nowrap;">${escapeHtml(
                k
              )}</th><td style="padding:4px 8px; vertical-align:top;">${formatValue(v)}</td></tr>`
          )
          .join("");

        return `
          <div style="max-height: 40vh; overflow:auto;">
            <table style="border-collapse:collapse; font-size:12px;">
              <tbody>${rows}</tbody>
            </table>
          </div>
        `;
      }

      function normalizeZona(value) {
        if (value === null || value === undefined) return "";
        return String(value).trim();
      }

      function layerDefaultStyle(feature) {
        const geom = feature?.geometry?.type;
        if (geom === "Point" || geom === "MultiPoint") {
          return {
            radius: 6,
            color: "#1d4ed8",
            weight: 2,
            fillColor: "#60a5fa",
            fillOpacity: 0.8
          };
        }
        return {
          color: "#2563eb",
          weight: 2,
          opacity: 0.9,
          fillColor: "#60a5fa",
          fillOpacity: 0.2
        };
      }

      function layerSelectedStyle(feature) {
        const geom = feature?.geometry?.type;
        if (geom === "Point" || geom === "MultiPoint") {
          return {
            radius: 8,
            color: "#b45309",
            weight: 3,
            fillColor: "#f59e0b",
            fillOpacity: 0.95
          };
        }
        return {
          color: "#b45309",
          weight: 4,
          opacity: 1,
          fillColor: "#f59e0b",
          fillOpacity: 0.35
        };
      }

      function resetSelection() {
        const status = document.getElementById("searchStatus");
        if (!geoLayer) {
          status.textContent = "Camada ainda não carregou.";
          return;
        }

        geoLayer.eachLayer((layer) => {
          if (typeof layer.setStyle === "function") layer.setStyle(layerDefaultStyle(layer.feature));
        });
        status.textContent = "Seleção limpa.";
      }

      function searchByZona(zonaRaw) {
        const status = document.getElementById("searchStatus");
        if (!geoLayer) {
          status.textContent = "Camada ainda não carregou.";
          return;
        }

        const zona = normalizeZona(zonaRaw);
        if (!zona) {
          status.textContent = "Informe um valor para zona_eleit.";
          return;
        }

        const matches = [];

        geoLayer.eachLayer((layer) => {
          const f = layer.feature;
          const props = f?.properties || {};
          const value = normalizeZona(props.zona_eleit);
          const isMatch = value === zona;

          if (typeof layer.setStyle === "function") {
            layer.setStyle(isMatch ? layerSelectedStyle(f) : layerDefaultStyle(f));
          }

          if (isMatch) matches.push(layer);
        });

        if (matches.length === 0) {
          status.textContent = `Nenhum registro com zona_eleit = "${zona}".`;
          return;
        }

        status.textContent = `${matches.length} registro(s) selecionado(s). Aproximando...`;

        const group = L.featureGroup(matches);
        const bounds = group.getBounds();
        if (bounds.isValid()) {
          map.fitBounds(bounds, { padding: [30, 30], maxZoom: 17 });
        }
      }

      async function loadGeoJSON() {
        try {
          const res = await fetch("./Santana.geojson", { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status} ao carregar Santana.geojson`);
          const data = await res.json();

          const geo = L.geoJSON(data, {
            pointToLayer: (feature, latlng) =>
              L.circleMarker(latlng, layerDefaultStyle(feature)),
            style: (feature) => layerDefaultStyle(feature),
            onEachFeature: (feature, layer) => {
              const html = buildAttributesTable(feature?.properties);
              layer.bindPopup(html, { maxWidth: 420 });
              layer.on("click", () => layer.openPopup());
            }
          }).addTo(map);

          geoLayer = geo;
          overlays["Santana (GeoJSON)"] = geo;
          layerControl.addOverlay(geo, "Santana (GeoJSON)");

          const bounds = geo.getBounds();
          if (bounds.isValid()) map.fitBounds(bounds, { padding: [20, 20] });
        } catch (err) {
          console.warn(err);
        }
      }

      loadGeoJSON();

      // UI events
      const zonaInput = document.getElementById("zonaInput");
      const searchBtn = document.getElementById("searchBtn");
      const clearBtn = document.getElementById("clearBtn");

      searchBtn.addEventListener("click", () => searchByZona(zonaInput.value));
      clearBtn.addEventListener("click", () => {
        zonaInput.value = "";
        resetSelection();
      });
      zonaInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") searchByZona(zonaInput.value);
      });
    </script>
  </body>
</html>
